name: Build Proxy Opera Dark (From Source)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем ваш код из репозитория
    - uses: actions/checkout@v3

    # 2. Настраиваем Java 17
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. Настраиваем Gradle 8.5
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # 4. Скачиваем внешние зависимости (Бинарник и Сертификат)
    - name: Download External Binaries
      run: |
        # Создаем папки, если их нет (git не хранит пустые папки)
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/jniLibs/arm64-v8a

        # Скачиваем SSL сертификат
        curl -L -o app/src/main/assets/cacert.pem https://curl.se/ca/cacert.pem
        
        # Скачиваем ядро Opera Proxy и переименовываем в библиотеку
        curl -L -o app/src/main/jniLibs/arm64-v8a/liboperaproxy.so https://github.com/Snawoot/opera-proxy/releases/download/v1.13.1/opera-proxy.android-arm64

    # 5. Сборка
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    # 6. Загрузка готового APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: opera-turbo-proxy
        path: app/build/outputs/apk/debug/app-debug.apk
