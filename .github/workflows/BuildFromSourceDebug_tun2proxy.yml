name: Build Proxy Opera (tun2proxy)

on:
  #push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из репозитория
    - uses: actions/checkout@v3

    # 2. Настраиваем Java 17
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. Настраиваем Gradle 8.5
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # 4. Устанавливаем утилиты для работы с архивами и JSON
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip jq

    # 5. Скачиваем внешние зависимости (динамически берём latest релизы)
    - name: Download External Binaries
      run: |
        # Создаем папки, если их нет
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/jniLibs/arm64-v8a

        # Скачиваем SSL сертификат
        curl -L -o app/src/main/assets/cacert.pem https://curl.se/ca/cacert.pem
        
        # -----------------------------
        # Opera Proxy: latest release
        # -----------------------------
        OPERA_PROXY_ASSET_URL=$(curl -s https://api.github.com/repos/Snawoot/opera-proxy/releases/latest \
          | jq -r '.assets[] | select(.name == "opera-proxy.android-arm64") | .browser_download_url')

        if [ -z "$OPERA_PROXY_ASSET_URL" ] || [ "$OPERA_PROXY_ASSET_URL" = "null" ]; then
          echo "Не найден asset opera-proxy.android-arm64 в последнем релизе Snawoot/opera-proxy"
          exit 1
        fi

        echo "Будет скачан opera-proxy из: $OPERA_PROXY_ASSET_URL"

        curl -L -o app/src/main/jniLibs/arm64-v8a/liboperaproxy.so "$OPERA_PROXY_ASSET_URL"

        # -----------------------------
        # tun2proxy: latest release
        # -----------------------------
        TUN2PROXY_ASSET_URL=$(curl -s https://api.github.com/repos/tun2proxy/tun2proxy/releases/latest \
          | jq -r '.assets[] | select(.name == "tun2proxy-android-libs.zip") | .browser_download_url')

        if [ -z "$TUN2PROXY_ASSET_URL" ] || [ "$TUN2PROXY_ASSET_URL" = "null" ]; then
          echo "Не найден asset tun2proxy-android-libs.zip в последнем релизе tun2proxy/tun2proxy"
          exit 1
        fi

        echo "Будет скачан tun2proxy из: $TUN2PROXY_ASSET_URL"

        # Скачиваем архив с последними android-libs tun2proxy
        curl -L -o tun2proxy-android-libs.zip "$TUN2PROXY_ASSET_URL"

        # Распаковываем архив
        unzip -o tun2proxy-android-libs.zip -d tun2proxy-android-libs-extract

        # Копируем libtun2proxy.so для arm64-v8a в jniLibs
        cp tun2proxy-android-libs-extract/tun2proxy-android-libs/arm64-v8a/libtun2proxy.so \
           app/src/main/jniLibs/arm64-v8a/libtun2proxy.so

    # 6. Сборка
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace
      
    - name: Rename APK to Opera_Proxy_v3.apk
      run: |
        ls -R app/build/outputs/apk || true
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Opera_Proxy_v3.apk

    # 7. Загрузка готового APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Opera_Proxy_v3
        path: app/build/outputs/apk/debug/Opera_Proxy_v3.apk